name: Split & Upload Julia Installer with LFS

on:
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Git LFS
        run: |
          sudo apt-get update
          sudo apt-get install git-lfs -y
          git lfs install

      - name: Download Julia installer
        run: |
          wget -O julia-win64.zip https://julialang-s3.julialang.org/bin/winnt/x64/1.12/julia-1.12.5-win64.zip

      - name: Split large file
        run: |
          mkdir -p julia_parts
          split -b 90M julia-win64.zip julia_parts/julia-part-

      - name: Track parts with LFS
        run: |
          git lfs track "julia_parts/*"
          git add .gitattributes

      - name: Commit & Push only if needed
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
        run: |
          git config user.name "Your Name"
          git config user.email "your-email@example.com"
          git add julia_parts/*
          git branch -M julia-installer
          if ! git diff-index --quiet HEAD; then
            git commit -m "Add Julia installer split parts with LFS"
            git push https://$GITHUB_TOKEN@github.com/<YOUR_USERNAME>/Julia-windows64-installer.git julia-installer
          else
            echo "Nothing new to commit."
          fi
