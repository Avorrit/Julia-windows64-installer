name: Julia Download Minimal

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - run: sudo apt-get update && sudo apt-get install git-lfs -y && git lfs install
      - run: wget -O julia-win64.zip https://julialang-s3.julialang.org/bin/winnt/x64/1.12/julia-1.12.5-win64.zip
      - run: git lfs track "julia-win64.zip" && git add .gitattributes julia-win64.zip
      - run: git config --global user.name "GitHub Actions" && git config --global user.email "actions@github.com" && git commit -m "Add Julia Win64" || echo "No changes" && git push
