name: Download Split And Upload Julia

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install Git LFS
        run: |
          sudo apt-get update
          sudo apt-get install git-lfs -y
          git lfs install

      - name: Download Julia installer
        run: |
          wget -O julia.zip https://julialang-s3.julialang.org/bin/winnt/x64/1.12/julia-1.12.5-win64.zip

      - name: Split file
        run: |
          mkdir -p julia_parts
          split -b 90M julia.zip julia_parts/julia-part-

      - name: Track with LFS
        run: |
          git lfs track "julia_parts/*"
          git add .gitattributes

      - name: Commit and Push
        env:
          TOKEN: ${{ secrets.PAT }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git checkout -B julia-installer

          git add .

          git commit -m "upload julia installer" || echo "nothing to commit"

          git push --force https://$TOKEN@github.com/<YOUR_USERNAME>/Julia-windows64-installer.git julia-installer
