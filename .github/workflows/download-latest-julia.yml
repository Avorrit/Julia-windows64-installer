name: Download Julia Win64 with LFS

on:
  workflow_dispatch:

jobs:
  download-and-upload:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          lfs: true

      - name: Install Git LFS
        run: |
          sudo apt-get update
          sudo apt-get install git-lfs -y
          git lfs install

      - name: Download Julia Win64
        run: |
          wget -O julia-win64.zip https://julialang-s3.julialang.org/bin/winnt/x64/1.12/julia-1.12.5-win64.zip

      - name: Track with LFS
        run: |
          git lfs track "julia-win64.zip"
          git add .gitattributes julia-win64.zip

      - name: Commit and Push
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_PAT }}
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git commit -m "Add Julia Win64 installer via LFS" || echo "No changes to commit"
          git push https://$GITHUB_PAT@github.com/Avorrit/Julia-windows64-installer.git
