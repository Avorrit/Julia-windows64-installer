name: Download Split And Upload Julia

on:
  workflow_dispatch:

jobs:
  build_and_upload:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Download Julia installer
        run: |
          curl -L -o julia.zip https://julialang-s3.julialang.org/bin/winnt/x64/1.12/julia-1.12.5-win64.zip
          ls -lh julia.zip

      - name: Split file into 10MB parts
        run: |
          mkdir -p julia_parts
          split -b 10M julia.zip julia_parts/julia-part-
          ls -lh julia_parts

      - name: Commit & Push 10MB parts
        run: |
          git checkout -B julia-installer
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add julia_parts
          git commit -m "upload julia installer 10MB parts" || echo "Nothing to commit"
          git push https://x-access-token:$GITHUB_TOKEN@github.com/${{ github.repository }} julia-installer -v
