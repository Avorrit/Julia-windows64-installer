name: Download Split And Upload Julia

on:
  workflow_dispatch:

jobs:

  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

  download:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Download Julia installer
        run: |
          curl -L -o julia.zip https://julialang-s3.julialang.org/bin/winnt/x64/1.12/julia-1.12.5-win64.zip || echo "DOWNLOAD_FAILED"
          ls -lh julia.zip || echo "FILE_NOT_FOUND"

  split:
    runs-on: ubuntu-latest
    needs: download
    steps:
      - name: Split file into 10MB parts
        run: |
          mkdir -p julia_parts
          split -b 10M julia.zip julia_parts/julia-part- || echo "SPLIT_FAILED"
          ls -lh julia_parts

  commit_push:
    runs-on: ubuntu-latest
    needs: split
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

      - name: Checkout branch
        run: |
          git checkout -B julia-installer

      - name: Stage files
        run: |
          git add julia_parts
          git status

      - name: Commit files
        run: |
          git commit -m "upload julia installer 10MB parts" || echo "Nothing to commit"

      - name: Push to GitHub
        run: |
          git push https://x-access-token:$GITHUB_TOKEN@github.com/${{ github.repository }} julia-installer -v || echo "PUSH_FAILED"
