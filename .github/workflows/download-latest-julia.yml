name: Upload Julia Installer Split

on:
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Download Julia installer
        run: |
          wget -O julia-win64.zip https://julialang-s3.julialang.org/bin/winnt/x64/1.12/julia-1.12.5-win64.zip

      - name: Split large file
        run: |
          mkdir julia_parts
          split -b 90M julia-win64.zip julia_parts/julia-part-

      - name: Commit & Push
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
        run: |
          git config user.name "Your Name"
          git config user.email "your-email@example.com"
          git add julia_parts/*
          git commit -m "Add Julia installer split parts"
          git push https://$GITHUB_TOKEN@github.com/<YOUR_USERNAME>/Julia-windows64-installer.git main
