name: Download Julia and Upload to Release

on:
  workflow_dispatch:

jobs:
  release_upload:
    runs-on: ubuntu-latest
    steps:
      - name: Download Julia installer
        run: |
          curl -L -o julia.zip https://julialang-s3.julialang.org/bin/winnt/x64/1.12/julia-1.12.5-win64.zip
          ls -lh julia.zip

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v1
        with:
          name: julia-1.12.5-win64.zip
          tag_name: julia-1.12.5
          files: julia.zip
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
