name: Download Julia and Upload to Release (Win + Linux)

on:
  workflow_dispatch:

jobs:
  release_upload:
    runs-on: ubuntu-latest
    steps:
      - name: Download Julia Windows installer
        run: |
          curl -L -o julia-win.zip https://julialang-s3.julialang.org/bin/winnt/x64/1.12/julia-1.12.5-win64.zip
          ls -lh julia-win.zip

      - name: Download Julia Linux tarball
        run: |
          curl -L -o julia-linux.tar.gz https://julialang-s3.julialang.org/bin/linux/x64/1.12/julia-1.12.5-linux-x86_64.tar.gz
          ls -lh julia-linux.tar.gz

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v1
        with:
          name: Julia 1.12.5 Windows + Linux
          tag_name: julia-1.12.5
          files: |
            julia-win.zip
            julia-linux.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
